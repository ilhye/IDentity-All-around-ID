<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDentity</title>
    <link rel="stylesheet" href="./style/index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="logo mb-5">
      <h5 class="logo-text text-center m-0 text-white">IDentity</h5>
    </div>

    <div
      class="text-center d-flex flex-column justify-content-center align-items-center"
    >
      <h1 class="question">
        Do you identify with any of the following accessibility needs? <br />
        <b>Select all that apply</b> <br />
        <img class="text-to-speech" src="./assets/volume-up.svg" alt="speech" />
      </h1>
      <button class="impairment-btn">Impaired Vision</button>
      <button class="impairment-btn">Dyslexic</button>
      <button class="impairment-btn">Mobility</button>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
